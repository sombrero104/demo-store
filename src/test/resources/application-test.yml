spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:demo_store_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 15
      timeout: 3s
      connect-timeout: 3s
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
      data-locations: classpath:/sql/test-reset.sql
  flyway:
    enabled: false

jwt:
  secret: "NodGfz1e1W/rerb8J7RdBHegpgxlZJwrb3xmBqQLxo0="
  access-expiration-time: 300000
  refresh-expiration-time: 604800000

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  ai:
    openai:
      enabled: false
      api-key: test-key
      model: gpt-4o-mini
      base-url: https://api.openai.com
      timeout-seconds: 3
  security:
    cookie:
      secure: false
      same-site: Lax
      path: /api/account
      max-age-seconds: 604800

logging:
  level:
    com.store.service.OrderPlacementExecutor: debug
    com.store.service.OrderPlacementTxService: debug
